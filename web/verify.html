<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - StripCall</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 10px;
        }
        p {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .button {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        .button:hover {
            background: #2563eb;
        }
        .error {
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .loading {
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading">
            <h1>Verifying your email...</h1>
            <p>Please wait while we confirm your email address.</p>
        </div>
        
        <div id="success" style="display: none;">
            <div class="success-icon">✓</div>
            <h1>Email Verified!</h1>
            <p>Your email has been successfully verified. Redirecting you to the StripCall app...</p>
        </div>
        
        <div id="error" style="display: none;">
            <h1>Verification Failed</h1>
            <p id="error-message">There was an error verifying your email address.</p>
            <a href="/" class="button">Return to StripCall</a>
        </div>
    </div>

    <script>
        // Supabase returns tokens in the URL fragment (#), not query string (?)
        // Parse both locations to handle either format
        function getParams() {
            // Try hash fragment first (Supabase default for email confirm)
            const hash = window.location.hash.substring(1);
            const hashParams = new URLSearchParams(hash);
            // Also check query string as fallback
            const queryParams = new URLSearchParams(window.location.search);

            return {
                error: hashParams.get('error') || queryParams.get('error'),
                errorDescription: hashParams.get('error_description') || queryParams.get('error_description'),
                accessToken: hashParams.get('access_token') || queryParams.get('access_token'),
                refreshToken: hashParams.get('refresh_token') || queryParams.get('refresh_token'),
                type: hashParams.get('type') || queryParams.get('type'),
            };
        }

        const params = getParams();

        if (params.error) {
            // Show error message
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            if (params.errorDescription) {
                document.getElementById('error-message').textContent = params.errorDescription;
            }
        } else if (params.accessToken) {
            // Success - user is confirmed
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'block';

            // Redirect to the Flutter app with the tokens so Supabase client can pick them up
            setTimeout(() => {
                window.location.href = '/app/#access_token=' + params.accessToken
                    + (params.refreshToken ? '&refresh_token=' + params.refreshToken : '')
                    + (params.type ? '&type=' + params.type : '');
            }, 2000);
        } else {
            // No tokens or error, show error
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = 'Invalid verification link. Please try clicking the link from your email again.';
        }
    </script>
</body>
</html>
